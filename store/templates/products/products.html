{% extends 'base.html' %}
{% load i18n %}

{% block central_content %}
    {% include "store-menu.html" %}

    <div class="row toolbar-search pt-2 pb-2 m-0">
        <div class="col-1"><i class="fas fa-search"></i></div>
        <div class="col-11">
            <input type="text" class="autosearch form-control form-control-dark w-100" name="s-name" id="s-name" 
               placeholder="{% trans 'Nombre' %}" data-url="{% url "products-search" %}" 
               data-target="products-list" data-related="s-name" />
        </div>
    </div>
    <div class="content mt-4">
        <div class="toolbar-content">
			<h2 class="pathway b-right">{% trans 'Productos' %} <span id="items-counter" class="badge badge-secondary">
                {{items|length}}</span></h2>
        </div>
        <div id="books-list">{% include "products/products-list.html" %}</div>
    </div>
    {% include "common-modal.html" %}
{% endblock central_content %}
