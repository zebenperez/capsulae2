{% load i18n %}
<table class="table table-striped table-hover">
    <thead>
        <tr class="small small">
            <th class="row main-th">
                <div class="col-2"> {% trans 'Código' %} </div>
                <div class="col-3"> {% trans 'Nombre' %} </div>
                <div class="col-3"> {% trans 'Teléfono' %} </div>
                <div class="col-3"> {% trans 'Correo electrónico' %} </div>
                <div class="col-1"></div>
            </th>
        </tr>
    </thead>
    <tbody>
        {% for item in items %}
            <tr class="small" id="row_{{item.id}}">
                <td class="row">
                    <div class="col-2">{{item.code}}</div>
                    <div class="col-3">{{item.name}}</div>
                    <div class="col-3">{{item.phone}}</div>
                    <div class="col-3">{{item.email}}</div>
                    <div class="col-1">
                        <a class="btn btn-xs ark p-2" title="{%trans 'Edit provider'%}" data-url="{%url "providers-form" %}"
                            data-target-modal="common-modal" data-obj_id="{{item.id}}" title="{% trans "Editar" %}"> 
                            <i class="fas fa-edit"></i></a>
                        <a class="btn btn-xs ark" data-url="{% url "providers-remove" %}" data-target="providers-list" 
                            data-obj_id="{{item.id}}" title="{% trans 'Remove' %}" 
                            data-confirm="{% trans "Are you sure to remove this element?" %}"><i class="fas fa-trash"></i></a> 
                    </div>
                </td>
            </tr>
        {% endfor %}
    </tbody>
</table>
