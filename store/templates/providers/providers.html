{% extends 'base.html' %}
{% load i18n %}

{% block central_content %}
    {% include "store-menu.html" %}

    <div class="row toolbar-search pt-2 pb-2 m-0">
        <div class="col-1"><i class="fas fa-search"></i></div>
        <div class="col-11">
            <input type="text" class="autosearch form-control form-control-dark w-100" name="s-name" id="s-name" 
               placeholder="{% trans 'Nombre' %}" data-url="{% url "providers-search" %}" 
               data-target="providers-list" data-related="s-name" />
        </div>
    </div>
    <div class="content mt-4">
        <div class="toolbar-content">
			<h2 class="pathway b-right">{% trans 'Proveedores' %} <span id="items-counter" class="badge badge-secondary">
                {{items|length}}</span></h2>
            <button type="button" class="btn btn-sm ark new" data-url="{%url "providers-form"%}" data-target-modal="common-modal"> 
                <i class="fas fa-plus"></i> {% trans 'Crear Proveedor' %}</button> 
        </div>
        <div id="providers-list">{% include "providers/providers-list.html" %}</div>
    </div>
    {% include "common-modal.html" %}
{% endblock central_content %}
