{% load i18n %}

<div class="row" style="margin:0;">
    <div class="col-lg-2 col-12 mt-1">
        <label class="label">{% trans "Nacionalidad" %}:</label>
        <input type="text" class="form-control autosave input view" id="nationality" name="nationality" value="{{obj.origin.nationality}}" 
            title="{{obj.origin.nationality}}" data-model-name="pharma.patientorigin" data-obj-id="{{obj.origin.id}}" 
            data-url="{% url "autosave_field" %}" data-target="div-notification" disabled/> <span id="nationality__msg"></span>
    </div>
    <div class="col-lg-3 col-12 mt-1">
        <label class="label">{% trans "País de nacimiento" %}:</label>
        <select class="form-control autosave input view" id="country" name="country" data-model-name="pharma.patientorigin" 
            data-obj-id="{{obj.origin.id}}" data-url="{% url "autosave_field" %}" data-target="div-notification" disabled>
            <option value="">{% trans "---" %} </option>
            {% for item in country_list %} 
                <option value="{{item.id}}" {%if item == obj.origin.country%}selected{%endif%}>{{item.nombre}}</option> 
            {% endfor %}
        </select>
        <span id="country__msg"></span>
    </div>
    <div class="col-lg-3 col-12 mt-1">
        <label class="label">{% trans "Etnia" %}:</label>
        <select class="form-control autosave input view" id="etnia" name="etnia" data-model-name="pharma.patientorigin" 
            data-obj-id="{{obj.origin.id}}" data-url="{% url "autosave_field" %}" data-target="div-notification" disabled>
            <option value="">{% trans "---" %}</option>
            {% for item in etnia_list %} 
                <option value="{{item.id}}" {%if item == obj.origin.etnia%}selected{%endif%}>{{item.name}}</option> 
            {% endfor %}
        </select>
        <span id="etnia__msg"></span>
    </div>
</div>
