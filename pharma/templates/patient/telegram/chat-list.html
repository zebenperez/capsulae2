{% load i18n static %}


<div class="row spd-tab">
    <div class="col-12 text-end">
        <button type="button" class="btn btn-sm ark new" data-url="{%url "patient-telegram-register"%}" data-target-modal="common-modal" 
            data-patient_id="{{obj.id}}"> <i class="fas fa-plus"></i> {% trans 'Crear Registro' %}</button> 
    </div>
</div>


<table class="table table-striped table-hover">
    <thead>
        <tr class="small small">
            <th> {% trans 'Confirmada' %} </th>
            <th> {% trans 'Código' %} </th>
            <th> {% trans 'Observaciones' %} </th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for item in obj.patient_telegram.all %}
            <tr class="small row-item" id="row_{{item.id}}">
                <td>{%if item.confirmed%} <i class="fas fa-check text-success"></i> {%else%} <i class="fas fa-times text-danger"></i> {%endif%}</td>
                <td>{{ item.code }}</td>
                <td>{{ item.observations }}</td>
                <td>
                    {% if item.confirmed %}
                        <a class="btn btn-sm ark" title="{%trans 'Enviar mensaje'%}" data-url="{%url "patient-telegram-message" %}"
                            data-target-modal="common-modal" data-obj_id="{{item.id}}" data-patient_id="{{obj.id}}"> 
                            <i class="fab fa-telegram"></i></a>&nbsp;&nbsp;&nbsp;
                    {% endif %}
                    <a class="btn btn-sm ark" data-url="{%url "patient-telegram-register-remove"%}" data-obj_id="{{item.id}}" 
                        data-target="div-container" title="{% trans 'Remove' %}" data-confirm="{% trans "Are you sure to remove this element?" %}">
                        <i class="fas fa-trash"></i></a>
                </td>
            </tr>
        {% endfor %}
    </tbody>
</table>
