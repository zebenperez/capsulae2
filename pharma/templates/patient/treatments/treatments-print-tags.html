{% load pharma_tags i18n %}
<html lang="es">
	<head>
		<style>
            @media screen
            {
                body
                {
                    display: none;
                }

            }
			@page 
			{
				size: auto;
                width:95%;
                margin:1mm 1mm 1mm 1mm;
               /*transform: rotate(-90deg);*/
            }
            
            @media print { 
                body{
                    margin-left:.1%; 
                    width: 99.8%;

                    margin-top:0!important;

                }

                #toolbar {
                    display : none;
                }
            }
            p{margin:0}
            body * {font-size: 7.5pt;}
			table {border: 1px solid silver; padding-bottom:1em; border-collapse: collapse; width:100%;}
            td{ border-bottom:1px solid silver; padding-left:5px;}
            img {
                width: 1cm;
                height:1cm;
            
            }
            
            #toolbar{
                display:block;
                margin-bottom: .5em;
                

            }


            .med_table td{
                border: 1px solid silver;
            }
            .title{ font-size: 9pt; font-weight:bold; width:100%;}
            .subtitle { font-size: 8pt; width:95%; margin:auto;}
            .center { text-align: center}
            .top_align{vertical-align:top;}
            .page-break { page-break-after:always }
		</style>
	</head>

	<body style="">
        {% for tratamiento in tratamientos %}
            <div class="page">
                {% with medicamento=tratamiento.medicamentos.all.0 ficha=tratamiento|get_ficha  %}
                    {% include "patient/treatments/treatments-print-tags-template.html" %}
                {% endwith %}
            </div>
            <p style="" class="page-break"></p>
        {% endfor %}
        <script> window.print()</script>
    </body>
</html>
