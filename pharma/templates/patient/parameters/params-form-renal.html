{% load i18n static %}


<div class="row justify-center">
    <div class="col-6 text-left p-1">
        <div class="greybox-sm p-1">
            {% trans "Índice de creatina sérica (mg/dl)" %}
            <input type="text" class="form-control autosave" id="serin_creatine_index" name="serin_creatine_index" 
                value="{{obj.serin_creatine_index|default:""}}" title="{{obj.serin_creatine_index}}" data-model-name="pharma.bloodpressure" 
                data-obj-id="{{obj.id}}" data-url="{%url "autosave_field"%}" data-target="div-notification" 
                data-age="{{obj.patient.age}}" data-sex="{{obj.patient.sexo}}" data-race="{{obj.patient.black_race}}"/> 
                <span id="serin_creatine_index__msg"></span>
        </div>
    </div>
    <div class="col-6 text-left p-1">
        <div class="greybox-sm p-1">
            {% trans "MDRD-4 (ml/min/1.73m^2)" %}
            <input type="text" class="form-control autosave" id="mdrd_4" name="mdrd_4" value="{{obj.mdrd_4|default:""}}" 
                title="{{obj.mdrd_4}}" data-model-name="pharma.bloodpressure" data-obj-id="{{obj.id}}" data-url="{%url "autosave_field"%}" 
                data-target="div-notification" readonly/> <span id="mdrd_4__msg"></span>
            Filtrado Glomerular estimado
        </div>
    </div>
</div>
<div class="row justify-center">
    <div class="col-6 text-left p-1">
        <div class="greybox-sm p-1">
            {% trans "MDRM-4 IMS (ml/min/1.73m^2)" %}
            <input type="text" class="form-control autosave" id="mdrd_4_ims" name="mdrd_4_ims" value="{{obj.mdrd_4_ims|default:""}}" 
                title="{{obj.mdrd_4_ims}}" data-model-name="pharma.bloodpressure" data-obj-id="{{obj.id}}" data-url="{%url "autosave_field"%}" 
                data-target="div-notification" readonly/> <span id="mdrd_4_ims__msg"></span>
        </div>
    </div>
    <div class="col-6 text-left p-1">
        <div class="greybox-sm p-1">
            {% trans "CDK-EPI-CREATININA (ml/min/1.73m^2)" %}
            <input type="text" class="form-control autosave" id="cdk_epi_creatinine" name="cdk_epi_creatinine" 
                value="{{obj.cdk_epi_creatinine|default:""}}" title="{{obj.cdk_epi_creatinine}}" data-model-name="pharma.bloodpressure" 
                data-obj-id="{{obj.id}}" data-url="{%url "autosave_field"%}" data-target="div-notification" readonly/> 
                <span id="cdk_epi_creatinine__msg"></span>
        </div>
    </div>
</div>
