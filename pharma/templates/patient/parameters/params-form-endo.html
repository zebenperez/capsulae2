{% load i18n static %}


<div class="row justify-center">
    <div class="col-4 text-left p-1">
        <div class="greybox-sm p-1">
            {% trans "Glucemia basal (mg/dl)" %}
            <input type="text" class="form-control autosave" id="glucose" name="glucose" value="{{obj.glucose|default:""}}" 
                title="{{obj.glucose}}" data-model-name="pharma.bloodpressure" data-obj-id="{{obj.id}}" data-url="{%url "autosave_field"%}" 
                data-target="div-notification"/> <span id="glucose__msg"></span>
        </div>
    </div>
    <div class="col-4 text-left p-1">
        <div class="greybox-sm p-1">
            {% trans "Glicosilada (HbA1c) est." %}
            <input type="text" class="form-control autosave" id="glicosylated" name="glicosylated" value="{{obj.glicosylated|default:""}}" 
                title="{{obj.glicosylated}}" data-model-name="pharma.bloodpressure" data-obj-id="{{obj.id}}" data-url="{%url "autosave_field"%}" 
                data-target="div-notification"/> <span id="glicosylated__msg"></span>
        </div>
    </div>
</div>
