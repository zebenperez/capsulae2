{% load i18n %}

<table class="table table-striped table-hover">
    <thead>
        <tr class="small small">
            <th class="row main-th">
                <div class="col-4"> {% trans 'Nombre' %} </div>
                <div class="col-1"></div>
            </th>
        </tr>
    </thead>
    <tbody>
        {% for item in pri_list %}
            <tr class="small" id="row_{{item.id}}">
                <td class="row">
                    <div class="col-4">{{ item.principio_activo.principioactivo }}</div>
                    <div class="col-1">
                        <a class="btn btn-sm ark" data-url="{% url "patient-allergy-principle-remove" %}" data-obj_id="{{item.id}}" 
                            data-target="div-container" title="{% trans 'Remove' %}" 
                            data-confirm="{% trans "Are you sure to remove this element?" %}">
                            <i class="fas fa-trash"></i></a>
                    </div>
                </td>
            </tr>
        {% endfor %}
    </tbody>
</table>
