{% load i18n static %}


{%comment%}
<div class="row spd-tab">
    <div class="col-12 text-end">
        <button type="button" class="btn btn-sm ark new" data-url="{%url "patient-diagnoses-form"%}" data-target-modal="common-modal" 
            data-patient_id="{{obj.id}}"> <i class="fas fa-plus"></i> {% trans 'Crear Diagnóstico' %}</button> 
    </div>
</div>
{%endcomment%}

<div class="row toolbar-search pt-2 pb-2 m-0">
    <div class="col-1"><i class="fas fa-search"></i></div>
    <div class="col-10">
        <input type="text" class="form-control form-control-dark w-100 ark_change" name="s-name" id="s-name" 
           placeholder="{% trans 'Añadir diagnóstico' %}" data-url="{% url "patient-diagnoses-search" %}" 
           data-target-modal="common-modal" data-patient_id="{{obj.id}}"/>
    </div>
</div>

<table class="table table-striped table-hover">
    <thead>
        <tr class="small small">
            <th> {% trans 'Patología' %} </th>
            <th> {% trans 'Obs' %} </th>
            <th> {% trans 'Cie' %} </th>
            <th> {% trans 'Ciap' %} </th>
            <th> {% trans 'Inicio' %} </th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for item in obj.diagnoses %}
            <tr class="small row-item" id="row_{{item.id}}">
                <td>{{ item.cie_ciap.nombre }}</td>
                <td>{{ item.observaciones }}</td>
                <td>{{ item.cie_ciap.cie }}</td>
                <td>{{ item.cie_ciap.ciap }}</td>
                <td>
                    <a class="btn btn-sm ark" title="{%trans 'Editar'%}" data-url="{%url "patient-diagnoses-form" %}"
                        data-target-modal="common-modal" data-obj_id="{{item.id}}" data-patient_id="{{obj.id}}"> 
                        <i class="fas fa-edit"></i></a>&nbsp;&nbsp;&nbsp;
                    <a class="btn btn-sm ark" data-url="{%url "patient-diagnoses-remove"%}" data-obj_id="{{item.id}}" 
                        data-target="div-container" title="{% trans 'Remove' %}" data-confirm="{% trans "Are you sure to remove this element?" %}">
                        <i class="fas fa-trash"></i></a>
                </td>
            </tr>
        {% endfor %}
    </tbody>
</table>
