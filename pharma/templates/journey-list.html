{% load i18n %}


{% if journey_list|length > 0 %}
    {%comment%}
    <div class="row">
        <div class="col-11"> <input type="text" class="form-control front-search" id="search" data-row-class="row-journey" 
            placeholder="{% trans "Escriba código a buscar..." %}"/></div>
        <div class="col-1"><i class="fas fa-search"></i></div>
    {%endcomment%}

    <table class="table table-striped table-hover table-condensed col-xs-12">
        <thead>
            <tr class="info">
	            <th><span class="d-none d-sm-block"> Inicio</span> </th>
	            <th><span class="d-none d-sm-block"> Fin</span> </th>
	            <th><span class="d-none d-sm-block"> </span> </th>
                {#<th></th>#}
            </tr>
        </thead>

        <tbody>
            {% for obj in journey_list %} 
                <tr class="small row-journey" id="row-{{obj.id}}"> {% include "journey-list-row.html" %} </tr>
            {% endfor %}
        </tbody>
    </table>

    {% include "common-modal.html" %}
{% endif %}
