{% load i18n %}


<div class="row toolbar-search pt-2 pb-2 m-0 border-bottom">
    {#<div class="col-1"><i class="fas fa-search"></i></div>#}
    <div class="col-12">Ultimos pacientes creados</div> 
</div>

<div class="row">
    <table class="table table-striped table-hover table-condensed col-xs-12">
        <thead>
            <tr class="info">
	        <th><span class="d-none d-sm-block"> Historial</span> </th>
	        <th><span class="d-none d-sm-block"> Nombre</span> </th>
	        <th><span class="d-none d-sm-block"> CIP</span> </th>
	        <th><span class="d-none d-sm-block"> Edad</span> </th>
            <th></th>
            </tr>
        </thead>

        <tbody>
            {% for item in item_list %} 
                <tr class="small row-deliveri pointer" id="row-{{item.id}}" onclick="window.location='{%url "patient-view" item.id%}'">
                    <td>{{ item.n_historial }}</td>
                    <td>{{ item.full_name }} </td>
                    <td>{{ item.cip }}></td>
                    <td>{{ item.age }}</td>
                    <td class="text-right"> </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<div class="row toolbar-search pt-2 pb-2 m-0 border-bottom">
    <div class="col-12 text-center"> <a class="btn btn shadowBox-btn w-50" href="{% url "patients" %}"> Ver más </a> </div> 
</div>
