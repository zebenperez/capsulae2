{% load i18n %}
<style>
	.form-group{
		padding: 0.5em;
		background-color: #f8f8f8;
		border: 1px solid white;
	}
</style>
<div class="col-xs-12">
	<div class="col-xs-12">
		<h3> Seleccione los gráficos que desea imprimir</h3>
	</div>
	<div class="col-xs-12">
		<form class="form" id="form_plot" target="_blank" action="{% url 'registro_tension_print' paciente_id %}" method="get">
			 <div class="form-group col-xs-3">
			 		<div class="col-xs-12 text-left">
						<label class="switch_label">Peso</label>
					</div>
					<div class="col-xs-12">
    				<label class="switch">
					
    					<input type="checkbox" class="" value="weight" name="items[]"/>
						<span class="slider"></span>
					</label>
					</div>
					<input type="hidden" value="Peso" name="weight_label"/>
					<input type="hidden" value="#3e95cd" name="weight_color"/>
  			</div>
			 <div class="form-group col-xs-3">
					<div class="col-xs-12 text-left">
						<label class="switch_label">IMC</label>
					</div>
					<div class="col-xs-12">
    				<label class="switch">
    					<input type="checkbox" class="" value="bmi" name="items[]"/>
						<span class="slider"></span>
					</label>
					</div>

					<input type="hidden" value="IMC" name="bmi_label"/>
					<input type="hidden" value="#3cba9f" name="bmi_color"/>

  			</div>
			 <div class="form-group col-xs-3">
					<div class="col-xs-12 text-left">
						<label class="switch_label">Glicosilada</label>
					</div>
					<div class="col-xs-12">
    				<label class="switch">
    					<input type="checkbox" class="" value="glicosylated" name="items[]"/>
						<span class="slider"></span>
					</label>
					</div>
					<input type="hidden" value="Glicosilada" name="glicosylated_label"/>
					<input type="hidden" value="#e8c3b9" name="glicosylated_color"/>

  			</div>
			 <div class="form-group col-xs-3">
					<div class="col-xs-12 text-left">
						<label class="switch_label">Glucosa Basal</label>
					</div>
					<div class="col-xs-12">
    				<label class="switch">
    					<input type="checkbox" class="" value="glucose" name="items[]"/>
						<span class="slider"></span>
					</label>
					</div>
					<input type="hidden" value="Glucosa basal" name="glucose_label"/>
					<input type="hidden" value="#c45850" name="glucose_color"/>

  			</div>
			 <div class="form-group col-xs-3">
    				<div class="col-xs-12 text-left">
						<label class="switch_label">Pulso</label>
					</div>
					<div class="col-xs-12">
    				<label class="switch">
						<input type="checkbox" class="" value="hearth_rate" name="items[]"/>
						<span class="slider"></span>
					</label>
					</div>
					
				
					<input type="hidden" value="Pulso" name="hearth_rate_label"/>
					<input type="hidden" value="#c334eb" name="hearth_rate_color"/>

  			</div>
			 <div class="form-group col-xs-3">
    				
					<div class="col-xs-12 text-left">
						<label class="switch_label">Ta Máx</label>
					</div>
					<div class="col-xs-12">
    				<label class="switch">
						<input type="checkbox" class="" value="bpressure_max" name="items[]"/>
						<span class="slider"></span>
					</label>
					</div>
					
					<input type="hidden" value="Ta Máx" name="bpressure_max_label"/>
					<input type="hidden" value="#eb4034" name="bpressure_max_color"/>


  			</div>

			<div class="form-group col-xs-3">
    				<div class="col-xs-12 text-left">
						<label class="switch_label">Ta Mín</label>
					</div>
					<div class="col-xs-12">
    				<label class="switch">
						<input type="checkbox" class="" value="bpressure_min" name="items[]"/>
						<span class="slider"></span>
					</label>
					</div>
					
					
					<input type="hidden" value="Ta Min" name="bpressure_max_label"/>
					<input type="hidden" value="#ebc034" name="bpressure_max_color"/>

  			</div>

            <input type="hidden" value="{{ start_date }}" name="start_date">
            <input type="hidden" value="{{ end_date }}" name="end_date">
			<div class="col-xs-12 text-center">
                <button class="btn btn-success btn-block" id="print_report" type="submit" value="Imprimir" name="print_report"> <i class="fa fa-print"></i> Imprimir </button>
			</div>

		</form>
	</div>
	<script>

	</script>
</div>
