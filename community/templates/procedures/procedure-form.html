{% load i18n %}


<div class="row">
    <div class="col-11"> <h2><i class="fa fa-history"></i>&nbsp; {% trans 'Modificar trámite' %}</h2> </div>
    <div class="col-1">
        <div class="d-flex justify-content-end"> <button type="button" class="btn btn-lg" data-bs-dismiss="modal" title="{% trans "Close" %}">
            <i class="fas fa-times"></i></button> </div>
    </div>
</div>

<div id="div-notification"></div>

<div class="row justify-center">
    <div class="col-4">
        <div class="row">
            <div class="greybox-sm p-1">
                {% trans "Código" %}
                <input type="text" class="form-control autosave" id="code" name="code" value="{{obj.code|default:""}}" 
                    title="{{obj.code}}" data-model-name="community.procedure" data-obj-id="{{obj.id}}" data-url="{%url "autosave_field"%}" 
                    data-target="div-notification" placeholder="Código..." /> <span id="code__msg"></span>
            </div>
        </div>
    </div>
    <div class="col-8">
        <div class="row">
            <div class="greybox-sm p-1">
                {% trans "Nombre" %}
                <input type="text" class="form-control autosave" id="name" name="name" value="{{obj.name|default:""}}" 
                    title="{{obj.name}}" data-model-name="community.procedure" data-obj-id="{{obj.id}}" data-url="{%url "autosave_field"%}" 
                    data-target="div-notification" placeholder="Nombre..." /> <span id="name__msg"></span>
            </div>
        </div>
    </div>
    <div class="col-12">
        <div class="row">
            <div class="greybox-sm p-1">
                {% trans "Descripción" %}
                <textarea class="form-control autosave" id="desc" name="desc" title="{{obj.desc}}" 
                    data-model-name="community.procedure" data-obj-id="{{obj.id}}" data-url="{%url "autosave_field"%}" 
                    data-target="div-notification" placeholder="Escriba aquí la descripción...">{{obj.desc}}</textarea>
                    <span id="desc__msg"></span>
            </div>
        </div>
    </div>
</div>

<div class="d-flex justify-content-end">
    <button type="button" class="btn btn-sm ark save" data-bs-dismiss="modal" data-url="{% url "procedure-list" %}"
        data-target="procedure-list">{% trans "Guardar" %}</button>
</div>
