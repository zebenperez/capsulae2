{% load i18n %}

<div class="row" style="margin:0;">
    <div class="col-12 mt-3">
        <label class="label">{% trans "Facebook" %}:</label>
        <input type="text" class="form-control input autosave input view" id="facebook" name="facebook" value="{{social.facebook|default:""}}" 
            title="{{social.facebook}}" data-model-name="community.organizationsocial" data-obj-id="{{social.id}}" 
            data-url="{%url "autosave_field"%}" data-target="div-notification" placeholder="Facebook..." disabled/> <span id="facebook__msg"></span>
    </div>
    <div class="col-12 mt-3">
        <label class="label">{% trans "Instagram" %}:</label>
        <input type="text" class="form-control input autosave input view" id="instagram" name="instagram" value="{{social.instagram|default:""}}" 
            title="{{social.instagram}}" data-model-name="community.organizationsocial" data-obj-id="{{social.id}}" 
            data-url="{%url "autosave_field"%}" data-target="div-notification" placeholder="Instagram..." disabled/> 
        <span id="instagram__msg"></span>
    </div>
    <div class="col-12 mt-3">
        <label class="label">{% trans "Twitter" %}:</label>
        <input type="text" class="form-control input autosave input view" id="twitter" name="twitter" value="{{social.twitter|default:""}}" 
            title="{{social.twitter}}" data-model-name="community.organizationsocial" data-obj-id="{{social.id}}" 
            data-url="{%url "autosave_field"%}" data-target="div-notification" placeholder="Twitter..." disabled/> <span id="twitter__msg"></span>
    </div>
    <div class="col-12 mt-3">
        <label class="label">{% trans "Youtube" %}:</label>
        <input type="text" class="form-control input autosave input view" id="youtube" name="youtube" value="{{social.youtube|default:""}}" 
            title="{{social.youtube}}" data-model-name="community.organizationsocial" data-obj-id="{{social.id}}" 
            data-url="{%url "autosave_field"%}" data-target="div-notification" placeholder="Youtube..." disabled/> <span id="youtube__msg"></span>
    </div>
</div>
