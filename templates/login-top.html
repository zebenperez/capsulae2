{% load i18n static %}

<div id="divTopBar">
    <div class="row">
        <div id="AppName" class="col-3 col-lg-3 text-center pt-4"> 
            <img src="/static/imgs/logo-capsulae.png" width="150"/> <span class="Appdescription"></span>
        </div>
        <div class="dataForm col-sm-9 col-lg-9">
            <form class="form-horizontal p-2" method="post" action="{% url "auth_login" %}">
                {% csrf_token %}
                <input type="hidden" name="next" value="{% url 'pharma-index' %}" />
                <div class="row">
                    <div class="form-group col-5">
                        <label for="username">Usuario</label>
                        <input name="username" type="text" value="" id="username" class="form-control"/>
                    </div>
                    <div class="form-group col-5">
                        <label for="password">Contrase&ntilde;a</label>
                        <input name="password" type="password" value="" id="password" class="form-control"/>
                    </div>
                    <div class="form-group col-2">
                        <label for="btn-submit">&nbsp;</label>
                        <button type="submit" class="btn btn-info form-control" id="btn-submit">Entrar</button> 
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
