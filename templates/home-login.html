{% load i18n static %}

<form class="form-horizontal" method="post" action="{% url "auth_login" %}">

    {% csrf_token %}
    <input type="hidden" name="next" value="{% url 'pharma-index' %}" />
    <div class="loginPanel">
        <div class="form-group">
            <label for="username">Usuario</label><br />
            
            <input name="username" type="text" value="" id="username" class="form-control">
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label><br />
            
            <input name="password" type="password" value="" id="password" class="form-control">
        </div>
        <div class="form-group text-center">
            <label for="btn-submit">&nbsp;</label>
            <button type="submit" class="btn submitBnt form-control pointer" id="btn-submit">Entrar</button>
        
            <a onclick="$('#row-new-passwd').toggle()" class="new-link pointer">¿Olvidaste tu contraseña?</a>
    
        </div>
    </div>
</form>
<form class="form-horizontal" method="post" action="{% url "send_new_password_by_email" %}">
    {% csrf_token %}
    <div class="hideClass" id="row-new-passwd">
        <div class="recover-pass w-100">
   
            <div class="float-start w-100"><input name="email" type="text" value="" id="email" class="form-control w-100" placeholder="Indique su correo electrónico"/></div>
            <div class="float-start w-100"><button type="submit" class="btn sendBtn form-control pointer" id="btn-submit"> {%trans "Enviar nuevo password"%}</button></div>
        </div>
    </div>
</form>
