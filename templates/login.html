{% load i18n static %}
<html>
    <head>
        <title>Fundec</title>
        <link rel="stylesheet" href="{% static 'css/login.css' %}" >
        <link rel="stylesheet" href="{% static 'css/polimedicado.css' %}" >

        <script src="https://code.jquery.com/jquery-3.6.1.min.js" integrity="sha256-o88AwQnZB+VDvE9tvIXrMQaPlFFSUTR+nldQm1LuPXQ=" 
            crossorigin="anonymous"></script>
		
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" 
            integrity="sha384-gH2yIJqKdNHPEq0n4Mqa/HGKIhSkIHeL5AyhkYV8i59U5AR6csBvApHHNl/vI1Bx" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.min.js" 
            integrity="sha384-ODmDIVzN+pFdexxHEHFBQH3/9/vQ9uori45z4JjnFsRydbmQbmL5t1tQ0culUzyK" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js" 
            integrity="sha384-A3rJD856KowSb7dwlZdYEkO39Gagi7vIsF0jrRAoQmDKKtQBHUuLZ9AsSv4jD4Xa" crossorigin="anonymous"></script>

        <script src="{% static 'js/utils.js' %}"></script>
        <script src="{% static 'js/common.js' %}"></script>
    </head>
    <body id="login"> 
        <div class="">
			{% if messages %} {% for mesg in messages %}
				<div style="margin-bottom: -1.5em;"><div class="alert alert-danger"><i class="glyphicon glyphicon-ban-circle"></i>{{mesg}}</div></div>
			{% endfor %} {% endif %}

            {% include "login-top.html" %}

            {% include "login-main.html" %}

            <div id="divLoginFooter">
                <div id="divFootLogin">&copy;2022 capsulae.org <a href="{#{% url "privacy_policy" %}#}" target="_blank" >Política de privacidad</a>.
                </div>
            </div>

            {% include "common-modal.html" %}

            <script>
                $('#username').keypress(function(event) 
                {
                    if (event.keyCode == 13 || event.which == 13) 
                    {
                        $('#password').focus();
                        event.preventDefault();
                    }
                });
                $('#password').keypress(function(event) 
                {
                    if (event.keyCode == 13 || event.which == 13) 
                    {
                        $('#formLogin').submit();
                    }
                });
            </script>
        </div>
    </body>
</html>
