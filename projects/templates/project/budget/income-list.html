{% load i18n %}

<div class="project-section-header">
    <div></div>
    <button type="button" class="project-btn project-btn-ghost ark" data-url="{% url "project-income-form" %}"
        data-target-modal="common-modal" data-project_id="{{obj.id}}">
        <i class="fas fa-plus"></i> {% trans 'Nuevo ingreso' %}
    </button>
</div>

<div class="project-table money">
    <div class="project-table-head">
        <div>{% trans 'Descripción' %}</div>
        <div>{% trans 'Importe' %}</div>
        <div></div>
    </div>
    {% for item in obj.incomes.all %}
        <div class="project-table-row" id="row_{{item.id}}">
            <div class="project-table-desc">{{ item.desc|default:"---" }}</div>
            <div class="project-table-title">{{ item.amount }}</div>
            <div class="project-actions">
                <a class="project-icon-btn ark" title="{% trans 'Editar ingreso' %}" data-url="{% url "project-income-form" %}"
                    data-target-modal="common-modal" data-obj_id="{{item.id}}" data-project_id="{{obj.id}}">
                    <i class="fas fa-edit"></i>
                </a>
                <a class="project-icon-btn danger ark" data-url="{% url "project-income-remove" %}" data-obj_id="{{item.id}}"
                    data-target="div-container" title="{% trans 'Eliminar' %}"
                    data-confirm="{% trans "Are you sure to remove this element?" %}">
                    <i class="fas fa-trash"></i>
                </a>
            </div>
        </div>
    {% empty %}
        <div class="project-empty">{% trans "No hay ingresos." %}</div>
    {% endfor %}
</div>
