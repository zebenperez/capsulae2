{% load i18n %}


<div class="row spd-tab">
    <div class="col-12 text-end">
        <button type="button" class="btn btn-sm ark new" data-url="{% url "project-expense-form" %}" data-target-modal="common-modal" 
            data-project_id="{{obj.id}}"> <i class="fas fa-plus"></i> {% trans 'Nuevo gasto' %}</button> 
    </div>
</div>

<table class="table table-striped table-hover">
    <thead>
        <tr class="small small">
            <th class="row main-th">
                <div class="col-8"> {% trans 'Descripción' %} </div>
                <div class="col-2"> {% trans 'Amount' %} </div>
                <div class="col-2"></div>
            </th>
        </tr>
    </thead>
    <tbody>
        {% for item in obj.expenses.all %}
            <tr class="small" id="row_{{item.id}}">
                <td class="row">
                    <div class="col-8">{{ item.desc }}</div>
                    <div class="col-2">{{ item.amount }}</div>
                    <div class="col-2 text-right">
                        <a class="btn btn-xs ark" title="{%trans 'Edit expense'%}" data-url="{%url "project-expense-form" %}"
                            data-target-modal="common-modal" data-obj_id="{{item.id}}" data-project_id="{{obj.id}}"> <i class="fas fa-edit"></i></a>
                        <a class="btn btn-sm ark" data-url="{%url "project-expense-remove"%}" data-obj_id="{{item.id}}" data-target="div-container" 
                            title="{% trans 'Remove' %}" data-confirm="{% trans "Are you sure to remove this element?" %}">
                            <i class="fas fa-trash"></i></a>
                    </div>
                </td>
            </tr>
        {% endfor %}
    </tbody>
</table>
