{% load i18n %}

<div class="project-modal">
<div class="project-modal-close">
    <button type="button" class="project-icon-btn" data-bs-dismiss="modal" title="{% trans "Close" %}">
        <i class="fas fa-times"></i>
    </button>
</div>

<h2>{% trans 'Editar Ingreso' %}</h2>

<div class="project-form-grid">
    <div class="project-form-field">
            <label>{% trans "Descripción" %}</label>
            <input type="text" class="form-control autosave" id="desc" name="desc" value="{{obj.desc}}" title="{{obj.desc}}" 
                data-model-name="projects.income" data-obj-id="{{obj.id}}" data-url="{%url "autosave_field"%}" data-target="div-notification"/> 
                <span id="desc__msg"></span>
    </div>
    <div class="project-form-field">
            <label>{% trans "Cantidad" %}</label>
            <input type="text" class="form-control autosave" id="amount" name="amount" value="{{obj.amount}}" title="{{obj.amount}}" 
                data-model-name="projects.income" data-obj-id="{{obj.id}}" data-url="{%url "autosave_field"%}" data-target="div-notification"/> 
                <span id="amount__msg"></span>
    </div>
</div>

<div class="project-modal-actions">
    <button type="button" class="project-btn project-btn-primary ark save" data-bs-dismiss="modal" data-url="{% url "project-budget" %}"
        data-target="div-container" data-obj_id="{{obj.project.id}}">{% trans "Guardar" %}</button>
</div>
</div>
