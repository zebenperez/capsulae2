{% load i18n %}

<div class="d-flex justify-content-end"> <button type="button" class="btn btn-lg" data-bs-dismiss="modal" title="{% trans "Close" %}">
    <i class="fas fa-times"></i></button> </div>

<h2>{% trans 'Editar Detalles' %}</h2>

<span id="div-notification"></span>
<div class="row justify-center">
    <div class="col-12 mt-3 p-2">
        <div class="greybox-xlg p-2">
            {% trans "Nombre" %}:
            <input type="text" class="form-control autosave" id="name" name="name" value="{{obj.name}}" 
                title="{{obj.name}}" data-model-name="projects.project" data-obj-id="{{obj.id}}" data-url="{% url "autosave_field" %}" 
                data-target="div-notification"/> <span id="name__msg"></span>
        </div>
    </div>
    <div class="col-12 mt-3 p-2">
        <div class="greybox-xlg p-2">
            {% trans "Fecha de ejecución" %}:
            <input type="text" class="form-control autosave" id="end_date" name="end_date" value="{{obj.end_date}}" 
                title="{{obj.end_date}}" data-model-name="projects.project" data-obj-id="{{obj.id}}" data-url="{% url "autosave_field" %}" 
                data-target="div-notification"/> <span id="end_date__msg"></span>
        </div>
    </div>
    <div class="col-12 mt-3 p-2">
        <div class="greybox-xlg p-2">
            {% trans "Descripción" %}
            <textarea class="hide autosave" id="desc" name="desc"
                title="{{obj.desc}}" data-model-name="projects.project" data-obj-id="{{obj.id}}" data-url="{% url "autosave_field" %}" 
                data-target="div-notification" disabled>{{obj.desc}}</textarea> <span id="desc__msg"></span>
            <textarea id="desc-editor" class="active-editor" data-ref="desc">{{obj.desc}}</textarea>
        </div>
    </div>
</div>    
<div class="d-flex justify-content-end">
    <button type="button" class="btn btn-sm ark save" data-bs-dismiss="modal" data-url="{% url "project-details" %}"
        data-target="div-container" data-obj_id="{{obj.id}}">{% trans "Save" %}</button>
</div>

<script> $(".active-editor").each(function(){activeEditor($(this))}); </script>
