{% load i18n %}


<div class="row spd-tab">
    <div class="col-12 text-end">
        <button type="button" class="btn btn-sm ark new" data-url="{% url "project-activity-form" %}" data-target-modal="common-modal" 
            data-project_id="{{obj.id}}"> <i class="fas fa-plus"></i> {% trans 'Nueva actividad' %}</button> 
    </div>
</div>

<table class="table table-striped table-hover">
    <thead>
        <tr class="small small">
            <th class="row main-th">
                <div class="col-5"> {% trans 'Nombre' %} </div>
                <div class="col-5"> {% trans 'Descripción' %} </div>
                <div class="col-2"></div>
            </th>
        </tr>
    </thead>
    <tbody>
        {% for item in obj.activities.all %}
            <tr class="small" id="row_{{item.id}}">
                <td class="row">
                    <div class="col-5">{{ item.name }}</div>
                    <div class="col-5">{{ item.desc|safe }}</div>
                    <div class="col-2 text-right">
                        <a class="btn btn-xs" title="{%trans 'Register user'%}" href="{% url "project-activity-register" item.id %}" target="_blank"> 
                            <i class="fas fa-share-square"></i></a>
                        <a class="btn btn-xs ark" title="{%trans 'Registers'%}" data-url="{%url "project-activity-register-list" %}"
                            data-target-modal="common-modal" data-obj_id="{{item.id}}" data-project_id="{{obj.id}}"> <i class="fas fa-users"></i></a>
                        <a class="btn btn-xs ark" title="{%trans 'Edit activity'%}" data-url="{%url "project-activity-form" %}"
                            data-target-modal="common-modal" data-obj_id="{{item.id}}" data-project_id="{{obj.id}}"> <i class="fas fa-edit"></i></a>
                        <a class="btn btn-sm ark" data-url="{%url "project-activity-remove"%}" data-obj_id="{{item.id}}" data-target="div-container" 
                            title="{% trans 'Remove' %}" data-confirm="{% trans "Are you sure to remove this element?" %}">
                            <i class="fas fa-trash"></i></a>
                    </div>
                </td>
            </tr>
        {% endfor %}
    </tbody>
</table>
