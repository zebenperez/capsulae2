{% load i18n %}


<div class="d-flex justify-content-end"> <button type="button" class="btn btn-lg" data-bs-dismiss="modal" title="{% trans "Close" %}">
    <i class="fas fa-times"></i></button> </div>

<h2>{% trans 'Usuarios registrados' %}</h2>

<table class="table table-striped table-hover">
    <thead>
        <tr class="small small">
            <th class="row main-th">
                <div class="col-5"> {% trans 'Nombre' %} </div>
                <div class="col-5"> {% trans 'Correo electrónico' %} </div>
                <div class="col-2"></div>
            </th>
        </tr>
    </thead>
    <tbody>
        {% for item in obj.users.all %}
            <tr class="small" id="row_{{item.id}}">
                <td class="row">
                    <div class="col-5">{{ item.name }}</div>
                    <div class="col-5">{{ item.email }}</div>
                    <div class="col-2 text-right">
                        <a class="btn btn-sm autoremove" data-model-name="projects.activityuser" data-obj-id="{{item.id}}" 
                            data-url="{% url "autoremove_obj"%}" data-target="row_{{item.id}}" title="{% trans 'Remove' %}"
                            data-confirm="{% trans "Are you sure to remove this element?" %}"><i class="fas fa-trash"></i></a>
                    </div>
                </td>
            </tr>
        {% endfor %}
    </tbody>
</table>

<div class="d-flex justify-content-end">
    <button type="button" class="btn btn-sm ark save" data-bs-dismiss="modal" data-url="{% url "project-activities" %}"
        data-target="div-container" data-obj_id="{{obj.project.id}}">{% trans "Cerrar" %}</button>
</div>
