{% extends 'base.html' %}
{% load i18n %}

{% block central_content %}
    <div class="row toolbar-search pt-2 pb-2 m-0">
        <div class="col-lg-1 col-1"><i class="fas fa-search"></i></div>
        <div class="col-lg-11 col-11 text-left p-0">
            <input type="text" class="autosearch form-control form-control-dark w-100" name="s-name" id="s-name" 
               placeholder="{% trans 'Nombre' %}" data-url="{% url "project-search" %}" data-target="project-list" data-related="s-name" />
        </div>
    </div>
    <div class="content mt-4">
        <div class="toolbar-content">
	        <h2 class="pathway b-right">{% trans 'Proyectos' %} <span id="items-counter" class="badge badge-secondary">{{items|length}}</span></h2>
            <a class="btn btn-sm new" href="{% url "project-new" %}">{% trans "Nuevo proyecto"%}</a>
        </div>
        <div id="project-list"></div>
    </div>
    <a class="hide ark" id="load-project-list" data-url="{% url "project-list" %}" data-target="project-list"></a>
    <script>$(document).ready(function() {$("#load-project-list").click()})</script>
    {% include "common-modal.html" %}
{% endblock central_content %}
