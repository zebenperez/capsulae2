{% load i18n %}

<div class="project-modal">
    <div class="project-modal-close">
        <button type="button" class="project-icon-btn" data-bs-dismiss="modal" aria-label="{% trans 'Cerrar' %}">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <h2>{% if obj %}{% trans "Editar factura" %}{% else %}{% trans "Nueva factura" %}{% endif %}</h2>

    <form id="invoice-form">
        <input type="hidden" name="obj_id" value="{{ obj.id|default:"" }}">
        <div class="project-form-grid project-form-grid-project">
            <div class="project-form-field">
                <label>{% trans "Localizador" %}</label>
                <input type="text" class="form-control" value="{{ obj.locator|default:"Se generará al guardar" }}" readonly>
            </div>
            <div class="project-form-field">
                <label>{% trans "Código factura" %}</label>
                <input type="text" class="form-control" name="invoice_code" value="{{ obj.invoice_code|default:"Se generará al guardar" }}" readonly>
            </div>
            <div class="project-form-field">
                <label>{% trans "Número factura" %}</label>
                <input type="text" class="form-control" name="number" value="{{ obj.number|default:"" }}" required>
            </div>

            <div class="project-form-field">
                <label>{% trans "Fecha factura" %}</label>
                <input type="date" class="form-control" name="issue_date" value="{{ obj.issue_date|date:"Y-m-d" }}" required>
            </div>

            <div class="project-form-field">
                <label>{% trans "Fecha pago" %}</label>
                <input type="date" class="form-control" name="payment_date" value="{{ obj.payment_date|date:"Y-m-d" }}">
            </div>
            <div class="project-form-field">
                <label>{% trans "NIF proveedor" %}</label>
                <input type="text" class="form-control" name="provider_tax_id" value="{{ obj.provider_tax_id|default:"" }}" required>
            </div>

            <div class="project-form-field">
                <label>{% trans "Base" %}</label>
                <input type="number" step="0.01" min="0" class="form-control invoice-amount" name="taxable_base"
                    value="{{ obj.taxable_base|default:"0.00" }}" required>
            </div>
            <div class="project-form-field">
                <label>{% trans "Impuestos" %}</label>
                <input type="number" step="0.01" min="0" class="form-control invoice-amount" name="taxes"
                    value="{{ obj.taxes|default:"0.00" }}" required>
            </div>
            <div class="project-form-field">
                <label>{% trans "Total" %}</label>
                <input type="number" step="0.01" min="0" class="form-control invoice-total" name="total_amount"
                    value="{{ obj.total_amount|default:"0.00" }}" readonly>
            </div>

            <div class="project-form-field project-form-field-wide">
                <label>{% trans "Concepto" %}</label>
                <textarea class="form-control" name="concept" required>{{ obj.concept|default:"" }}</textarea>
            </div>
        </div>
    </form>

    <div class="project-modal-actions">
        <button type="button" class="project-btn project-btn-primary ajax-form-get" data-form="invoice-form"
            data-url="{% url "invoice-save" %}" data-target="invoice-list" data-dismiss-modal="common-modal">
            {% trans "Guardar" %}
        </button>
    </div>
</div>

<script>
    (function(){
        function updateInvoiceTotal(){
            var base = parseFloat($('[name="taxable_base"]').val() || "0");
            var taxes = parseFloat($('[name="taxes"]').val() || "0");
            $(".invoice-total").val((base + taxes).toFixed(2));
        }
        $(".invoice-amount").on("input", updateInvoiceTotal);
        updateInvoiceTotal();
    })();
</script>
