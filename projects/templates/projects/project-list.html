{% load i18n %}


<div class="row patient-list-head main-th small small pt-3 pb-3 m-0">
            <div class="col-5"> {% trans 'Nombre' %} </div>
            <div class="col-5"> {% trans 'Descripción' %} </div>
            <div class="col-2"></div>
</div>

{% for item in items %}
    <div class="row line small pt-2 pb-2 m-0" id="row_{{item.id}}" onclick="window.location='{%url "project-view" item.id%}'">
        <div class="col-5">{{ item.name|default:"---" }}</div>
        <div class="col-5">{{ item.desc|safe }}</div>
        <div class="col-2 text-right">
            <a class="btn btn-sm ark" data-url="{% url "project-remove" %}" data-target="project-list" data-obj_id="{{item.id}}" 
                title="{% trans 'Remove' %}" data-confirm="{% trans "Are you sure to remove this element?" %}"><i class="fas fa-trash"></i></a> 
        </div>
    </div>
{% endfor %}
