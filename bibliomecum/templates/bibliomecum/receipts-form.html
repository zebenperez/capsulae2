{% load i18n %}


<div class="row">
    <div class="col-11"> <h2><i class="fa fa-history"></i>&nbsp; {% trans 'Receta' %}</h2> </div>
    <div class="col-1"> <div class="d-flex justify-content-end"> 
        <button type="button" class="btn btn-lg" data-bs-dismiss="modal" title="{% trans "Close" %}">
            <i class="fas fa-times"></i></button> 
    </div> </div>
</div>

<span id="div-notification"></span><br/>

<div class="row justify-center">
    <div class="col-6"> <div class="greybox-sm p-1"> {% trans "ATC" %}
        <input type="text" class="form-control autosave" id="atc" name="atc" value="{{obj.atc}}" 
	        title="{{obj.atc}}" data-model-name="bibliomecum.biblioreceipt" data-obj-id="{{obj.id}}" 
            data-url="{%url "autosave_field"%}" data-target="div-notification" /> <span id="atc__msg"></span>
    </div> </div>

    <div class="col-6"> <div class="greybox-sm p-1"> {% trans "CIAP" %}
        <input type="text" class="form-control autosave" id="ciap" name="ciap" value="{{obj.ciap}}" 
	        title="{{obj.ciap}}" data-model-name="bibliomecum.biblioreceipt" data-obj-id="{{obj.id}}" 
            data-url="{%url "autosave_field"%}" data-target="div-notification" /> <span id="ciap__msg"></span>
    </div> </div>
</div>
<div class="row spd-tab">
    <div class="col-12 text-end">
        <button type="button" class="btn btn-sm ark new" data-url="{%url "bibliomecum-receipts-isbn-add"%}" 
            data-target="div-isbn" data-obj_id="{{obj.id}}"> <i class="fas fa-plus"></i> {% trans 'Añadir ISBN' %}</button> 
    </div>
</div>
<div id="div-isbn">{% include "bibliomecum/receipts-isbn-list.html" %}</div>
<div class="row justify-center">
    <div class="col-12"> <div class="greybox-sm p-1"> {% trans "Consejos de uso" %}
	    <textarea class="form-control autosave" id="advices" name="advices" title="{{obj.advices}}" 
        	data-model-name="bibliomecum.biblioreceipt" data-obj-id="{{obj.id}}" data-url="{%url "autosave_field"%}" 
	        data-target="div-notification">{{obj.advices}}</textarea> <span id="advices__msg"></span>
    </div> </div>
</div>
<div class="row justify-center">
    <div class="col-12"> <div class="greybox-sm p-1"> {% trans "Contraindicaciones" %}
	    <textarea class="form-control autosave" id="contras" name="contras" title="{{obj.contras}}" 
        	data-model-name="bibliomecum.biblioreceipt" data-obj-id="{{obj.id}}" data-url="{%url "autosave_field"%}" 
	        data-target="div-notification">{{obj.contras}}</textarea> <span id="contras__msg"></span>
    </div> </div>
</div>

<div class="d-flex justify-content-end">
    <button type="button" class="btn btn-sm ark save" data-bs-dismiss="modal" data-url="{% url "patient-bibliomecum" %}"
        data-target="div-container" data-obj_id="{{obj.patient.id}}">{% trans "Guardar" %}</button>
</div>
