{% load i18n %}
<table class="table table-striped table-hover">
    <thead>
        <tr class="small small">
            <th class="row main-th">
                <div class="col-2"> {% trans 'ISBN' %} </div>
                <div class="col-3"> {% trans 'Título' %} </div>
                <div class="col-3"> {% trans 'Autores' %} </div>
                <div class="col-3"> {% trans 'Editorial' %} </div>
                <div class="col-1"></div>
            </th>
        </tr>
    </thead>
    <tbody>
        {% for item in items %}
            <tr class="small" id="row_{{item.id}}">
                <td class="row">
                    <div class="col-2">{{item.isbn}}</div>
                    <div class="col-3">{{item.title}}</div>
                    <div class="col-3">{{item.authors}}</div>
                    <div class="col-3">{{item.editorial}}</div>
                    <div class="col-1">
                        {%comment%}
                        {% if item.ft %}
                            <a class="btn btn-default btn-sm" target="_blank" href="{{ item.ft }}" 
                                title="{% trans 'Ficha T&eacute;cnica' %}"> <i class="fas fa-list"></i></a>
                        {% endif %}
                        {% if item.prospect %}
                            <a class="btn btn-default btn-sm" target="_blank" href="{{item.prospect}}" title="{%trans 'Prospecto'%}">
                                <i class="fas fa-book"></i></a>
                        {% endif %}
                        <a class="btn btn-default btn-sm" target="_blank" href="{% url "medication-print-tag" item.id %}" 
                            title="{% trans 'Etiqueta' %}"> <i class="fas fa-tag"></i></a>
                        {%endcomment%}
                    </div>
                </td>
            </tr>
        {% endfor %}
    </tbody>
</table>
