{% load i18n %}


<div class="row">
    <div class="col-11"> <h2><i class="fa fa-history"></i>&nbsp; {% trans 'Modificar usuario' %}</h2> </div>
    <div class="col-1">
        <div class="d-flex justify-content-end"> 
            <button type="button" class="btn btn-lg" data-bs-dismiss="modal" title="{% trans "Close" %}">
            <i class="fas fa-times"></i></button> </div>
    </div>
</div>

<div id="div-notification"></div>

<div class="row justify-center">
    <div class="col-12">
        <div class="row">
            <div class="greybox-sm p-1">
                {% trans "Nombre" %}
                <input type="text" class="form-control autosave" id="first_name" name="first_name" 
                    value="{{obj.user.first_name|default:""}}" title="{{obj.user.first_name}}" data-model-name="auth.user" 
                    data-obj-id="{{obj.user.id}}" data-url="{%url "autosave_field"%}" data-target="div-notification" 
                    placeholder="Nombre de usuario..." /> <span id="first_name__msg"></span>
            </div>
        </div>
    </div>
    <div class="col-12">
        <div class="row">
            <div class="greybox-sm p-1">
                {% trans "Nombre de usuario" %}
                <input type="text" class="form-control autosave" id="username" name="username" value="{{obj.user.username|default:""}}"
                    title="{{obj.user.username}}" data-model-name="auth.user" data-obj-id="{{obj.user.id}}" 
                    data-url="{%url "autosave_field"%}" data-target="div-notification" placeholder="Nombre de usuario..." /> 
                    <span id="username__msg"></span>
            </div>
        </div>
    </div>
    <div class="col-12">
        <div class="row">
            <div class="greybox-sm p-1">
                {% trans "Correo electrónico" %}
                <input type="text" class="form-control autosave" id="email" name="email" value="{{obj.user.email|default:""}}" 
                    title="{{obj.user.email}}" data-model-name="auth.user" data-obj-id="{{obj.id}}" 
                    data-url="{%url "autosave_field"%}" data-target="div-notification" placeholder="Correo electrónico..." /> 
                    <span id="email__msg"></span>
            </div>
        </div>
    </div>
    <div class="col-12">
        <div class="row">
            <div class="greybox-sm p-1">
                {% trans "PIN" %}
                <input type="text" class="form-control autosave" id="pin" name="pin" value="{{obj.pin|default:""}}" 
                    title="{{obj.pin}}" data-model-name="account.employeeprofile" data-obj-id="{{obj.id}}" 
                    data-url="{%url "autosave_field"%}" data-target="div-notification" placeholder="PIN..." /> 
                    <span id="pin__msg"></span>
            </div>
        </div>
    </div>
    <div class="col-12">
        <div class="row">
            <div class="greybox-sm p-1">
                {% trans "Tipo de usuario" %}
                <select class="form-control autosave" id="user_type" name="user_type" data-model-name="account.employeeprofile" 
                    data-obj-id="{{obj.id}}" data-url="{%url "autosave_field"%}" data-target="div-notification"> 
                    <option value="">{% trans "-- Seleccione un tipo --" %}</option>
                    {% for item in user_type_list %}
                        <option value="{{item.id}}" {% if item == obj.user_type %}selected{% endif %}>{{item.name}}</option>
                    {% endfor %}
                </select>
                <span id="user_type__msg"></span>
            </div>
        </div>
    </div>
    <div class="col-12">
        <div class="row">
            <div class="greybox-sm p-1">
                {% trans "Activo" %}
                <input type="checkbox" class="autosave" id="is_active" name="is_active" data-model-name="auth.user" 
                    data-obj-id="{{obj.user.id}}" data-url="{%url "autosave_field"%}" data-target="div-notification" data-bool="True"
                    {% if obj.user.is_active %}checked{% endif %}/> 
                    <span id="is_active__msg"></span>
            </div>
        </div>
    </div>
    <div class="col-12">
        <div class="row">
            <div class="greybox-sm p-1">
                {% trans "Menus" %}
                <select class="form-control autosave" id="menus" name="menus" data-model-name="account.usermenu" 
                    data-obj-id="{{user_menu.id}}" data-url="{%url "autosave_field"%}" data-target="div-notification" multiple>  
                    {#<option value="">{% trans "-- Seleccione un tipo --" %}</option>#}
                    {% for item in menu_list %}
                        <option value="{{item.id}}" {% if item in user_menu.menus.all %}selected{% endif %}>{{item.name}}</option>
                    {% endfor %}
                </select>
                <span id="menus__msg"></span>
            </div>
        </div>
    </div>
</div>

<div class="d-flex justify-content-end">
    <button type="button" class="btn btn-sm ark save" data-bs-dismiss="modal" data-url="{% url "employee-list" %}"
        data-target="employee-list">{% trans "Guardar" %}</button>
</div>
