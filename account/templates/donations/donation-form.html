{% load i18n %}


<div class="d-flex justify-content-end"> <button type="button" class="btn btn-lg" data-bs-dismiss="modal" title="{% trans "Close" %}">
    <i class="fas fa-times"></i></button> </div>

<h2>{% trans 'Editar Donación' %}</h2>

<div class="row justify-center">
    <div class="col-6 mt-3 p-2">
        <div class="greybox-xlg p-2">
            {% trans "Plan" %}
            <select class="form-control autosave" id="plan" name="plan" data-url="{%url "autosave_field"%}" data-target="div-notification">
                {%for item in plan_list%}<option value="{{item.id}}" {%if item.id == obj.plan.id%}selected{%endif%}>{{item.name}}</span>{%endfor%}
            </select>
        </div>
    </div>
    <div class="col-6 mt-3 p-2">
        <div class="greybox-xlg p-2">
            {% trans "Cantidad" %}
            <input type="text" class="form-control autosave" id="amount" name="amount" value="{{obj.amount}}" title="{{obj.amount}}" 
                data-model-name="account.userprofile" data-obj-id="{{obj.id}}" data-url="{%url "autosave_field"%}" data-target="div-notification"/>
                <span id="amount__msg"></span>
        </div>
    </div>
</div>

<div class="d-flex justify-content-end">
    <button type="button" class="btn btn-sm ark save" data-bs-dismiss="modal" data-url="{% url "donation-index" %}"
        data-target="div-container">{% trans "Save" %}</button>
</div>
